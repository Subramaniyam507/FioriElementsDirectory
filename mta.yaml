_schema-version: 3.3.0
ID: FioriElementsDirectory
description: A simple CAP project.
version: 1.0.0
modules:
- name: FioriElementsDirectory-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: FioriElementsDirectory-db
  - name: FioriElementsDirectory-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: FioriElementsDirectory-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: FioriElementsDirectory-db
  parameters:
    buildpack: nodejs_buildpack
- name: FioriElementsDirectory-destination-content
  type: com.sap.application.content
  requires:
  - name: FioriElementsDirectory-destination
    parameters:
      content-target: true
  - name: FioriElementsDirectory_html_repo_host
    parameters:
      service-key:
        name: FioriElementsDirectory_html_repo_host-key
  - name: uaa_FioriElementsDirectory
    parameters:
      service-key:
        name: uaa_FioriElementsDirectory-key
  parameters:
    content:
      instance:
        destinations:
        - Name: fioriel_FioriElementsDirectory_html_repo_host
          ServiceInstanceName: FioriElementsDirectory-html5-app-host-service
          ServiceKeyName: FioriElementsDirectory_html_repo_host-key
          sap.cloud.service: fioriel
        - Authentication: OAuth2UserTokenExchange
          Name: fioriel_uaa_FioriElementsDirectory
          ServiceInstanceName:  uaa_FioriElementsDirectory
          ServiceKeyName: uaa_FioriElementsDirectory-key
          sap.cloud.service: fioriel
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
resources:
- name: FioriElementsDirectory-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: FioriElementsDirectory-destination
  type: org.cloudfoundry.managed-service
  parameters:
    service: destination
    service-plan: lite
- name: FioriElementsDirectory_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: FioriElementsDirectory-html5-app-host-service
    service-plan: app-host
- name: uaa_FioriElementsDirectory
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
